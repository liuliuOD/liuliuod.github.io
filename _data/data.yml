experiences:
    title: Experiences
    info:
      - role: Software Engineer
        time: Dec 2023 - Present
        company: |
          President Chain Store Corporation(PCSC), [Web Portal](https://www.uniopen.com)
        details: |

      - role: Backend Software Engineer
        time: Apr 2020 - Nov 2023
        company: |
          HiSKIO, [Online Learning Platform](https://hiskio.com)
        details: |
          - **Development**:
            - Developed and maintained RESTful APIs using PHP (Laravel/Lumen).
              - Built fast unit tests to improve business-logic correctness.
              - Delivered resilient APIs for both the consumer-facing learning site and the admin portal.
              - Clarified requirements and proposed multiple solution options with pros/cons to support decision-making.
              - Improved response time of key endpoints by 20–30%.
              - Authored and maintained API documentation using Swagger/OpenAPI.
            - Integrated the OpenAI API to build a customized learning assistant bot.
            - Developed and maintained SPA features using Vue and Nuxt.
            - Optimized MySQL queries and reduced execution time by up to 50%.
            - Built asynchronous workflows with AWS SQS and Lambda.
              - Implemented an image-generation worker in Python 3.
              - Implemented an SEO screenshot worker in Node.js.
            - Integrated the LINE Messaging API with internal services to support customized workflows.
              - Launched personalized recommendations and improved customer retention by ~20%.
              - Tracked user-triggered events in LINE and routed them to internal services.
            - Proposed partial Serverless adoption, evaluated trade-offs, planned the migration approach, and led the implementation.
            - Built a customer support reply bot by integrating third-party APIs with ChatGPT.

          - **Operations & Maintenance**:
            - Maintained a 3-tier architecture on AWS (ALB, EC2, RDS).
            - Designed and integrated CI/CD pipelines using AWS CodePipeline, CodeBuild, and CodeDeploy.
            - Implemented auto scaling using ECR, Auto Scaling Groups (ASG), and CloudWatch Alarms to handle traffic spikes.
            - Containerized services with Docker to streamline deployments across staging and production.
              - Reduced Docker image size by ~50%.
              - Managed deployments with Docker Swarm.
            - Planned and executed framework/runtime upgrades.
              - Upgraded Laravel 8 → 9 → 10.
              - Migrated from PHP-FPM to Laravel Octane (Swoole).

          - **Monitoring & Incident Response**:
            - Monitored logs and service health metrics using AWS CloudWatch Logs.
            - Integrated Slack alerts for real-time notifications and reduced bug detection time by ~80%.
            - Built service health dashboards using AWS CloudWatch Dashboards.

          - **Search Engine Optimization (SEO)**:
            - Improved SPA SEO performance by integrating an on-premises prerendering solution.

          - **Tech Stack**:
             - PHP • Python 3 • JavaScript • Laravel • Lumen • Vue • Nuxt • Docker • MySQL • SQLite
             - AWS: EC2 • ELB/ALB • RDS • SQS • Lambda • CodePipeline • CodeBuild • CodeDeploy • CloudFormation • API Gateway • ECR • S3 • DynamoDB • Route 53
             - Third-Party APIs: LINE • Google • YouTube • Facebook • GTM • GA4

        details_print: |
          - Developed and maintained RESTful APIs using PHP (Laravel/Lumen).
          - Integrated the OpenAI API to build a customized learning assistant bot.
          - Integrated the LINE Messaging API with internal services to support customized workflows.
          - Maintained a 3-tier architecture on AWS (ALB, EC2, RDS).
          - Designed and integrated CI/CD pipelines using AWS CodePipeline, CodeBuild, and CodeDeploy.
          - Containerized services with Docker to streamline deployments across staging and production.
          - Monitored logs and service health metrics using AWS CloudWatch Logs.
          - Built service health dashboards using AWS CloudWatch Dashboards.
          - Improved SPA SEO performance by integrating an on-premises prerendering solution.

      - role: Intern & Software Engineer
