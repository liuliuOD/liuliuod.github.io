career-profile:
    title: About Me
    summary: |
      - Backend / Platform Engineer with 6+ years of experience building and operating cloud-native distributed systems on AWS and EKS.
      - Owned high-traffic production systems serving 2.5M+ users and ~10K peak QPS, improving performance, reliability, and operational efficiency through scalable architecture and infrastructure design.
      - Experienced in solving system-level challenges across API design, data modeling, event-driven workflows, observability, and cloud-native platforms.
      - Delivered end-to-end systems in collaboration with cross-functional teams, including identity, authorization, and media processing capabilities.
      - Known for pragmatic engineering decisions that reduce complexity, improve maintainability, and deliver measurable outcomes.
      - Proven ability to collaborate across teams to deliver end-to-end solutions, including identity systems, authorization services, and platform capabilities.
      - Strong focus on pragmatic, measurable engineering improvements across system design, infrastructure, and delivery workflows.

experiences:
    title: Experiences
    info:
      - role: Backend Software Engineer
        time: Dec 2023 - Present
        company: |
          President Chain Store Corporation(PCSC), [Web Portal](https://www.uniopen.com), [APP](https://www.uniopen.com/app)
        details: |
          - Built and operated backend services for a high-traffic web portal serving 2.5M+ users and ~10K peak QPS on AWS + EKS.
          - Designed OIDC/SSO identity and session flows, and delivered core domain services across membership, access control, and routing.
          - Led performance baseline defining, load testing, and tuning for an authorization service, improving critical endpoint latency by up to 77%, increasing QPS by 18%, and raising throughput from 300 to 500 RPS through database optimization, async HTTP integration, and multi-layer caching.
          - Investigated and resolved a complex multi-service production incident by tracing failures across internal services, optimizing a hot query causing full table scans, and adding slow-query alerting; reduced DB CPU from >85% to 20–30%, eliminated timeouts, and prevented recurrence.
          - Hardened Python container builds and runtimes with non-root execution and BuildKit-based secrets handling, reducing image size by ~58% and ~49% across services.
          - Investigated recurring OOM under sustained load by reproducing failures through load testing, isolating off-heap growth, Metaspace pressure, and a database bottleneck, and mitigating impact with query/index improvements and runtime tuning.
          - Delivered an event-driven video processing pipeline using S3, MediaConvert, and SQS/SNS, with status tracking and asynchronous polling for processing workflows.
          - Built reusable IaC-based CI/CD modules for all Spring Boot and Python backend projects, reducing pipeline time from 40 minutes to 20–25 minutes and standardizing delivery workflows across backend teams.
          - Developed a reusable, configuration-driven authentication SDK that enabled backend services to integrate in about 1 minute, eliminating repeated per-project implementation of HTTP clients and backpressure controls.
          - Defined and validated cross-account permission models and assessed cloud service capabilities for auth and infrastructure scenarios, balancing security, functional requirements, and cloud cost trade-offs.
          - Improved release safety and observability through CI quality gates, CloudWatch dashboards/alarms, centralized logging, and audit logging, supporting operational visibility and ISO 27001 compliance.
          - **Tech**:
            - Languages: Python, Java
            - Frameworks: FastAPI, Spring Boot
            - Datastores: PostgreSQL, Redis, DynamoDB, DocumentDB
            - Cloud/Infra: AWS (EKS, S3, SQS, SNS, Lambda, CloudWatch, MediaConvert)
            - Tooling: Terraform, Helm, Docker, Kubernetes
            - Testing/Perf: k6, Vegeta

        details_print: |
          - Built and operated backend services for a high-traffic web portal serving 2.5M+ users and ~10K peak QPS on AWS + EKS.
