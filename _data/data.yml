career-profile:
    title: About Me
    summary: >
      Backend / Platform Engineer with 6+ years of experience building and operating cloud-native distributed systems on AWS and EKS. I have led high-traffic production systems serving 2.5M+ users and ~10K peak RPS, with a focus on performance, reliability, and operational efficiency. My work spans API design, data modeling, event-driven workflows, observability, and cross-functional delivery across backend and platform capabilities.

experiences:
    title: Experiences
    info:
      - role: Senior Backend Software Engineer
        time: Dec 2023 - Present
        company: |
          President Chain Store Corporation(PCSC), [Web Portal](https://www.uniopen.com), [APP](https://www.uniopen.com/app)
        details: |
          - Built and operated backend services for a high-traffic web portal and mobile app serving 2.5M+ users and ~10K peak RPS on AWS + EKS, including activity launches and push-notification-driven traffic spikes of ~200K users; complete request tracing improved customer-support investigation and response speed by 30% and helped identify malicious behavior.
          - Designed OIDC/SSO identity and session flows, and delivered core services for membership, access control, and routing, with a reusable authentication SDK and API service template that let backend services integrate in about 1 minute and helped a ~20-person team reduce project bootstrap time by 80%.
          - Led performance baselining, load testing, and tuning for a core authorization service supporting login-protected APIs, reducing critical endpoint latency by up to 77% and increasing throughput from 300 to 500 RPS.
          - Traced and resolved a complex multi-service production incident, reducing DB CPU from >85% to 20–30%, eliminating timeouts, and preventing recurrence during login-dependent traffic spikes.
          - Hardened Python container builds and runtimes with non-root execution and BuildKit-based secrets handling, reducing image size by ~58% and ~49% across services.
          - Reproduced recurring OOM issues under sustained load, isolated off-heap growth, Metaspace pressure, and database bottlenecks, and mitigated impact through query/index improvements and runtime tuning to improve peak-load resilience.
          - Built reusable IaC-based CI/CD modules for Spring Boot and Python backend projects, cutting pipeline time from 40 minutes to 20–25 minutes; the modularized pipeline was adopted by at least 10 services and reduced ongoing delivery setup and maintenance cost.
          - Defined and validated cross-account permission models and evaluated cloud service capabilities for auth and infrastructure use cases, balancing security, functional requirements, and cloud cost.
          - Improved release safety and observability through CI quality gates, CloudWatch dashboards/alarms, centralized logging, and audit logging, strengthening user-action traceability, detecting malicious operations, and reducing incident investigation time by 30%.
          - Designed and operated a multi-product redirect service for uniopen web, uniopen app, and Open Point APP entry pages, covering hundreds of pages, dozens of brands, and millions of product cards; the service delivered click events to Kafka within 200ms, blocked malicious links through domain validation, and supported SSO redirects to improve user experience.
          - Applied EKS / Kubernetes / Istio expertise to capacity planning and production debugging, including requests/limits sizing and bottleneck analysis for Istio gateway, LB, and pod placement issues, improving peak-period stability.
          - Served as Scrum Master across PM, engineering, and marketing stakeholders, clarifying requirement gaps, evaluating technical options, and improving cross-team delivery quality for business-driven initiatives.
          - **Tech**:
            - Languages: Python, Java
            - Frameworks: FastAPI, Spring Boot
            - Datastores: PostgreSQL, Redis, DynamoDB, DocumentDB
            - Cloud/Infra: AWS (EKS, S3, SQS, SNS, Lambda, CloudWatch, MediaConvert)
            - Tooling: Terraform, Helm, Docker, Kubernetes
            - Testing/Perf: k6, Vegeta

