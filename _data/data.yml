career-profile:
    title: About Me
    summary: >
      Backend / Platform Engineer with 6+ years of experience building and operating cloud-native distributed systems on AWS and EKS. I have led high-traffic production systems serving 2.5M+ users and ~10K peak RPS, with a focus on performance, reliability, and operational efficiency. My work spans API design, data modeling, event-driven workflows, observability, and cross-functional delivery across backend and platform capabilities.

experiences:
    title: Experiences
    info:
      - role: Senior Backend Software Engineer
        time: Dec 2023 - Present
        company: |
          President Chain Store Corporation(PCSC), [Web Portal](https://www.uniopen.com), [APP](https://www.uniopen.com/app)
        details: |
          - Built and operated backend services for a high-traffic web portal and mobile app serving 2.5M+ users and ~10K peak RPS on AWS + EKS, including activity launches and push-notification-driven traffic spikes of ~200K users.
          - Designed OIDC/SSO identity and session flows, and delivered core services for membership, access control, and routing, with a reusable authentication SDK that let backend services integrate in about 1 minute.
          - Led performance baselining, load testing, and tuning for a core authorization service supporting login-protected APIs, reducing critical endpoint latency by up to 77% and increasing throughput from 300 to 500 RPS.
          - Traced and resolved a complex multi-service production incident, reducing DB CPU from >85% to 20–30%, eliminating timeouts, and preventing recurrence during login-dependent traffic spikes.
          - Hardened Python container builds and runtimes with non-root execution and BuildKit-based secrets handling, reducing image size by ~58% and ~49% across services.
          - Reproduced recurring OOM issues under sustained load, isolated off-heap growth, Metaspace pressure, and database bottlenecks, and mitigated impact through query/index improvements and runtime tuning to improve peak-load resilience.
          - Built reusable IaC-based CI/CD modules for Spring Boot and Python backend projects, cutting pipeline time from 40 minutes to 20–25 minutes and standardizing delivery workflows across backend teams.
          - Developed a reusable, configuration-driven authentication SDK that allowed backend services to integrate in about 1 minute.
          - Defined and validated cross-account permission models and evaluated cloud service capabilities for auth and infrastructure use cases, balancing security, functional requirements, and cloud cost.
          - Improved release safety and observability through CI quality gates, CloudWatch dashboards/alarms, centralized logging, and audit logging, improving troubleshooting speed and audit traceability.
          - Designed and operated a multi-product redirect service for uniopen web, uniopen app, and Open Point APP entry pages, covering hundreds of pages, dozens of brands, and millions of product cards for traffic routing and landing-page delivery.
          - Implemented redirect flow controls including Kafka-based async event delivery, whitelist domain validation, and SSO interaction with downstream services.
          - Applied deep EKS / Kubernetes / Istio knowledge to capacity planning and production debugging, including requests/limits sizing, topology spread constraints, and bottleneck analysis for Istio gateway, LB, and pod placement issues.
          - **Tech**:
            - Languages: Python, Java
            - Frameworks: FastAPI, Spring Boot
            - Datastores: PostgreSQL, Redis, DynamoDB, DocumentDB
            - Cloud/Infra: AWS (EKS, S3, SQS, SNS, Lambda, CloudWatch, MediaConvert)
            - Tooling: Terraform, Helm, Docker, Kubernetes
            - Testing/Perf: k6, Vegeta

        details_print: |
