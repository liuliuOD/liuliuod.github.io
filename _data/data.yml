career-profile:
    title: About Me
    summary: >
      Senior Backend / Platform Engineer with 6+ years of experience building cloud-native backend systems, platform capabilities, and production infrastructure on AWS and EKS. Experienced in building and operating high-traffic services serving 2.5M+ users and ~10K peak RPS, with a focus on authentication, API design, performance, reliability, CI/CD, and observability. Representative outcomes include reducing critical service endpoint latency by up to 77%, improving throughput from 300 to 500 RPS, resolving database bottlenecks under high traffic, and reducing CI/CD pipeline time from 40 minutes to 20–25 minutes.

experiences:
    title: Experiences
    info:
      - role: Senior Backend Software Engineer
        time: Dec 2023 - Present
        company: |
          President Chain Store Corporation(PCSC), [Web Portal](https://www.uniopen.com), [APP](https://www.uniopen.com/app)
        details: |
          - Built and operated backend and platform services for a high-traffic web portal and mobile app serving 2.5M+ users and ~10K peak RPS on AWS + EKS, supporting authenticated user journeys and campaign or push-notification traffic spikes of ~200K users.
          - Built the company’s core post-login authorization service from 0 to 1, owning API access validation, token handling, and OIDC identity lifecycle management for business-critical membership and authorization flows.
          - Designed OIDC/SSO identity and session flows as a shared foundation for membership, authorization, and cross-service routing; provided reusable authentication SDKs and API service templates adopted by ~20 backend services, reducing initial integration and service bootstrap time by ~80%.
          - Led performance baselining, load testing, and tuning for authenticated authorization services, reducing critical service endpoint latency by up to 77% and increasing throughput from 300 to 500 RPS to improve peak-period user experience.
          - Investigated and resolved a complex multi-service production incident during traffic spikes, reducing DB CPU from >85% to 20–30%, eliminating timeouts, and lowering operational risk for login-dependent flows.
          - Standardized IaC-based CI/CD workflows, CloudWatch dashboards/alarms, centralized logging, and audit logging across Spring Boot and Python backend services, cutting pipeline time from 40 minutes to 20–25 minutes and reducing incident investigation time by ~30%.
          - **Tech**:
            - Languages: Python, Java
            - Frameworks: FastAPI, Spring Boot
            - Datastores: PostgreSQL, Redis, DynamoDB, DocumentDB
            - Cloud/Infra: AWS (EKS, S3, SQS, SNS, Lambda, CloudWatch, MediaConvert)
            - Tooling: Terraform, Helm, Docker, Kubernetes, Istio
            - Testing/Perf: k6, Vegeta

        details_print: |
          - Built and operated backend and platform services for a high-traffic web portal and mobile app serving 2.5M+ users and ~10K peak RPS on AWS + EKS, supporting authenticated user journeys and campaign or push-notification traffic spikes of ~200K users.
          - Built the company’s core post-login authorization service from 0 to 1, owning API access validation, token handling, and OIDC identity lifecycle management for business-critical membership and authorization flows.
          - Designed OIDC/SSO identity and session flows as a shared foundation for membership, authorization, and cross-service routing; provided reusable authentication SDKs and API service templates adopted by ~20 backend services, reducing initial integration and service bootstrap time by ~80%.
          - Led performance baselining, load testing, and tuning for authenticated authorization services, reducing critical service endpoint latency by up to 77% and increasing throughput from 300 to 500 RPS to improve peak-period user experience.
          - Investigated and resolved a complex multi-service production incident during traffic spikes, reducing DB CPU from >85% to 20–30%, eliminating timeouts, and lowering operational risk for login-dependent flows.
          - Standardized IaC-based CI/CD workflows, CloudWatch dashboards/alarms, centralized logging, and audit logging across Spring Boot and Python backend services, cutting pipeline time from 40 minutes to 20–25 minutes and reducing incident investigation time by ~30%.
          - **Tech**: Python/Java, FastAPI/Spring Boot, PostgreSQL/Redis/DynamoDB, AWS EKS/SQS/Lambda/CloudWatch, Terraform/Helm, Kubernetes/Istio, k6/Vegeta.

      - role: Backend Software Engineer
        time: Apr 2020 - Nov 2023
        company: |
          HiSKIO, [Online Learning Platform](https://hiskio.com)
        details: |
          - Owned backend APIs for a 100K+ user online learning platform with ~4K DAU, supporting revenue- and retention-critical workflows across cart, payment, learning progress, membership, internal admin workflows, revenue sharing, and coupon systems.
          - Upgraded a Laravel monolith from v7 to v10 in 2 months through incremental migration, compatibility validation, and unit-test coverage, reducing legacy framework risk and improving API p99 latency by 20%.
          - Resolved critical MySQL performance bottlenecks through request-path profiling, EXPLAIN analysis, index tuning, and schema refactoring, reducing hot-path query time from 10–20 seconds to ~1 second and improving key workflow responsiveness.
          - Operated the AWS production stack across ALB, EC2, and RDS, covering CI/CD, autoscaling, CloudWatch dashboards/alarms, load testing, release verification, and post-release monitoring to improve availability and release safety.
          - Improved monitoring and incident response with Slack alerting, reducing MTTD by ~80% and shortening issue detection time for user-facing and operational flows.
          - Built asynchronous backend workflows with SQS + Lambda for LINE notifications and personalized recommendations, increasing repeat engagement and improving retention by ~20%.
          - **Tech**:
            - Languages: PHP, JavaScript, Python
            - Frameworks: Laravel, Lumen, Vue, Nuxt
            - Datastores: MySQL, SQLite
            - Cloud/Infra: AWS (EC2, ALB, RDS, SQS, Lambda, CloudWatch, ECR, S3)
            - Tooling: Docker, Docker Swarm, OpenAPI/Swagger
            - Testing: PHPUnit

        details_print: |
          - Owned backend APIs for a 100K+ user online learning platform with ~4K DAU, supporting revenue- and retention-critical workflows across cart, payment, learning progress, membership, internal admin workflows, revenue sharing, and coupon systems.
          - Upgraded a Laravel monolith from v7 to v10 in 2 months through incremental migration, compatibility validation, and unit-test coverage, reducing legacy framework risk and improving API p99 latency by 20%.
          - Resolved critical MySQL performance bottlenecks through request-path profiling, EXPLAIN analysis, index tuning, and schema refactoring, reducing hot-path query time from 10–20 seconds to ~1 second and improving key workflow responsiveness.
          - Operated the AWS production stack across ALB, EC2, and RDS, covering CI/CD, autoscaling, CloudWatch dashboards/alarms, load testing, release verification, and post-release monitoring to improve availability and release safety.
          - Improved monitoring and incident response with Slack alerting, reducing MTTD by ~80% and shortening issue detection time for user-facing and operational flows.
          - Built asynchronous backend workflows with SQS + Lambda for LINE notifications and personalized recommendations, increasing repeat engagement and improving retention by ~20%.

