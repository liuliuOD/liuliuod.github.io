              - 語言: Python, Java
              - 框架: FastAPI, Spring Boot
              - 資料庫: PostgreSQL, Redis, DynamoDB, DocumentDB
              - 雲端與基礎設施: AWS (EKS, S3, SQS, SNS, Lambda, CloudWatch, MediaConvert)
