  career-profile:
      title: 關於我
      summary: >
        資深後端與平台工程師，具備 6 年以上在 AWS 與 EKS 上建置雲原生後端系統、平台能力與正式環境基礎設施的經驗。曾負責支撐超過 250 萬用戶、峰值約 1 萬 RPS 的高流量服務，專注於身份驗證、API 設計、效能、可靠性、CI/CD 與可觀測性。代表成果包含核心 service endpoint latency 最多降低 77%、吞吐量從 300 提升至 500 RPS、排除高流量下的 database bottleneck，並將 CI/CD pipeline 從 40 分鐘縮短至 20～25 分鐘。

  experiences:
      title: 經歷
      info:
      - role: 資深後端與平台工程師
