zh:
  sidebar:
      name: 劉佳旻（劉劉）
      tagline: 資深後端 / 平台工程師
  education:
      title: 學歷
      info:
        - degree: 資訊工程學士
          university: 嘉義大學
          time: 2015 - 2019
  career-profile:
      title: 關於我
      summary: >
        我是一位專注於後端與平台的軟體工程師，具備 6 年以上在 AWS 與 EKS 上建置與營運雲原生分散式系統的經驗。曾主導服務超過 250 萬用戶、峰值約 1 萬 RPS 的高流量系統，持續聚焦效能、穩定性與營運效率。工作範圍涵蓋 API 設計、資料模型、事件驅動流程與可觀測性，也能與跨部門團隊協作，推動後端與平台能力落地。

  experiences:
      title: 經歷
      info:
      - role: 資深後端與平台工程師
        time: 2023/12 - 現在
        company: |
          統一超商股份有限公司（PCSC）, [入口網站](https://www.uniopen.com), [APP](https://www.uniopen.com/app)
        details: |
            - 從 0 到 1 建置公司登入授權核心服務，負責所有登入後 API 的存取驗證與 OIDC 身分生命週期管理，支援活動上線、訊息推播等約 20 萬用戶瞬時湧入的業務情境。系統部署於 AWS + EKS，支援超過 250 萬用戶、峰值約 1 萬 RPS，並透過完整請求歷程紀錄將客服查案與回覆速度提升 30%，同時協助識別惡意行為。
            - 設計 OIDC/SSO 與 session 流程，作為會員登入、權限控管與跨服務路由的共用核心；並提供跨團隊共用的 authentication SDK 與 API service template，讓後端服務可在約 1 分鐘內完成整合，協助約 20 人團隊將專案建置時間降低 80%。
            - 主導登入後核心權限服務的效能基準測試、壓測與調校，使關鍵 endpoint latency 最多降低 77%，並將吞吐量從 300 提升至 500 RPS，改善高峰期使用體驗。
            - 排查並解決登入依賴流量尖峰下的正式環境事故，將 DB CPU 從 85% 以上降至 20~30%，並消除 timeout，降低營運風險與客服壓力。
            - 透過持續壓測定位 OOM、off-heap 成長、Metaspace 壓力與 database bottleneck，並以查詢與索引優化、執行環境調校改善瓶頸，提升系統在尖峰流量與行銷檔期下的承載能力。
            - 主導共用型 IaC-based CI/CD 平台優化，將 Spring Boot 與 Python 後端專案的交付流程標準化，讓至少 10 個服務的 pipeline 共用同一套模組化交付機制；並透過模組化、平行化與建置步驟重整，將 pipeline 時間從 40 分鐘縮短至 20~25 分鐘，持續降低後續服務擴展與維護成本。
            - 建立 CI 品質門檻、CloudWatch 儀表板/警示、集中式 logging 與 audit logging，強化使用者操作歷程追蹤與惡意行為識別，並將 incident 調查時間降低 30%，提升發版安全性與稽核可追溯性。
            - 設計並維運多產品共用的 redirect service，覆蓋 uniopen web、uniopen app 與 Open Point APP 等入口頁面，支援數百個頁面、數十個品牌與數百萬個商品卡片的導流與落地頁承接需求；系統可於 200ms 內完成點擊事件送入 Kafka、驗證網址合法性避免惡意連結出現在網站內，並支援跳轉至 SSO 頁面優化使用者體驗。
            - 依工作負載特性設計 EKS / Kubernetes / Istio 的資源 requests / limits，並透過壓測與線上排查定位 Istio gateway、LB 與 pod placement 瓶頸，支援容量規劃、故障排除與高峰期穩定性優化。
            - 擔任 Scrum Master 協助 PM、開發與行銷團隊跨部門合作，主動釐清需求缺漏、評估技術選型，並與非技術利害關係人討論不同方案對業務情境的優缺點與影響，降低跨團隊溝通成本並提高需求落地品質。
            - **技術**:
              - 語言: Python, Java
              - 框架: FastAPI, Spring Boot
              - 資料庫: PostgreSQL, Redis, DynamoDB, DocumentDB
              - 雲端與基礎設施: AWS (EKS, S3, SQS, SNS, Lambda, CloudWatch, MediaConvert)
              - 工具: Terraform, Helm, Docker, Kubernetes
              - 測試與效能: k6, Vegeta

