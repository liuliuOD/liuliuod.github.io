career-profile:
    title: About Me
    summary: |
      - Backend / Platform Engineer with 6+ years of experience designing, building, and operating cloud-native distributed systems on AWS and EKS.
      - Led high-traffic production systems serving 2.5M+ users and ~10K peak QPS, with a focus on performance, reliability, and operational efficiency.
      - Strong track record in API design, data modeling, event-driven workflows, observability, and cloud-native platform work.
      - Comfortable partnering with cross-functional teams to deliver end-to-end capabilities across identity, authorization, and media processing.
      - Pragmatic engineer who prioritizes simplicity, maintainability, and measurable impact.

experiences:
    title: Experiences
    info:
      - role: Senior Backend Software Engineer
        time: Dec 2023 - Present
        company: |
          President Chain Store Corporation(PCSC), [Web Portal](https://www.uniopen.com), [APP](https://www.uniopen.com/app)
        details: |
          - Built and operated backend services for a high-traffic web portal and mobile app serving 2.5M+ users and ~10K peak QPS on AWS + EKS.
          - Designed OIDC/SSO identity and session flows, and delivered core services for membership, access control, and routing.
          - Led performance baselining, load testing, and tuning for an authorization service, improving critical endpoint latency by up to 77%, increasing QPS by 18%, and raising throughput from 300 to 500 RPS.
          - Traced and resolved a complex multi-service production incident, reducing DB CPU from >85% to 20–30%, eliminating timeouts, and preventing recurrence.
          - Hardened Python container builds and runtimes with non-root execution and BuildKit-based secrets handling, reducing image size by ~58% and ~49% across services.
          - Reproduced recurring OOM issues under sustained load, isolated off-heap growth, Metaspace pressure, and database bottlenecks, and mitigated impact through query/index improvements and runtime tuning.
          - Delivered an event-driven video processing pipeline using S3, MediaConvert, and SQS/SNS.
          - Built reusable IaC-based CI/CD modules for Spring Boot and Python backend projects, cutting pipeline time from 40 minutes to 20–25 minutes and standardizing delivery workflows across backend teams.
          - Developed a reusable, configuration-driven authentication SDK that allowed backend services to integrate in about 1 minute.
          - Defined and validated cross-account permission models and evaluated cloud service capabilities for auth and infrastructure use cases, balancing security, functional requirements, and cloud cost.
          - Improved release safety and observability through CI quality gates, CloudWatch dashboards/alarms, centralized logging, and audit logging.
          - **Tech**:
            - Languages: Python, Java
            - Frameworks: FastAPI, Spring Boot
            - Datastores: PostgreSQL, Redis, DynamoDB, DocumentDB
            - Cloud/Infra: AWS (EKS, S3, SQS, SNS, Lambda, CloudWatch, MediaConvert)
            - Tooling: Terraform, Helm, Docker, Kubernetes
            - Testing/Perf: k6, Vegeta

        details_print: |
          - Built and operated backend services for a high-traffic web portal serving 2.5M+ users and ~10K peak QPS on AWS + EKS.
          - Designed OIDC/SSO identity and session flows, and delivered core services for membership, access control, and routing.
          - Led performance baselining, load testing, and tuning for an authorization service, improving critical endpoint latency by up to 77%, increasing QPS by 18%, and raising throughput from 300 to 500 RPS.
          - Traced and resolved a complex multi-service production incident, reducing DB CPU from >85% to 20–30%, eliminating timeouts, and preventing recurrence.
          - Hardened Python container builds and runtimes with non-root execution and BuildKit-based secrets handling, reducing image size by ~58% and ~49% across services.
          - Reproduced recurring OOM issues under sustained load, isolated off-heap growth, Metaspace pressure, and database bottlenecks, and mitigated impact through query/index improvements and runtime tuning.
          - Delivered an event-driven video processing pipeline using S3, MediaConvert, and SQS/SNS.
          - Built reusable IaC-based CI/CD modules for Spring Boot and Python backend projects, cutting pipeline time from 40 minutes to 20–25 minutes and standardizing delivery workflows across backend teams.
          - Developed a reusable, configuration-driven authentication SDK that allowed backend services to integrate in about 1 minute.
          - Defined and validated cross-account permission models and evaluated cloud service capabilities for auth and infrastructure use cases, balancing security, functional requirements, and cloud cost.
          - Improved release safety and observability through CI quality gates, CloudWatch dashboards/alarms, centralized logging, and audit logging.
          - **Tech**: Python/Java, FastAPI/Spring Boot, PostgreSQL/Redis/DynamoDB, AWS EKS/SQS/Lambda/CloudWatch, Terraform/Helm, k6/Vegeta.

      - role: Backend Software Engineer
        time: Apr 2020 - Nov 2023
        company: |
          HiSKIO, [Online Learning Platform](https://hiskio.com)
        details: |
          - Built and maintained REST APIs in PHP (Laravel/Lumen) for a web product and admin portal serving 100K+ users and ~4K DAU, owning delivery from development through production rollout and monitoring.
          - Upgraded a Laravel monolith from v7 to v10 in 2 months through incremental migration, compatibility validation, and unit-test coverage, restoring framework support and improving API p99 latency by 20%.
          - Resolved critical MySQL performance bottlenecks by profiling request paths, analyzing EXPLAIN plans, and refactoring indexes and table design, reducing hot-path query time from 10–20 seconds to ~1 second.
          - Owned a 3-tier AWS stack (ALB / EC2 / RDS) and service operations, including CI/CD, autoscaling, CloudWatch dashboards/alarms, load testing, and post-release monitoring.
          - Improved monitoring and incident response with Slack alerting, reducing MTTD by ~80%.
          - Built asynchronous backend workflows with SQS + Lambda, and delivered user-facing integrations including LINE Messaging API notifications and personalized recommendations that improved retention by ~20%.
          - **Tech**:
            - Languages: PHP, JavaScript, Python
            - Frameworks: Laravel, Lumen, Vue, Nuxt
            - Datastores: MySQL, SQLite
            - Cloud/Infra: AWS (EC2, ALB, RDS, SQS, Lambda, CloudWatch, ECR, S3)
            - Tooling: Docker, Docker Swarm, OpenAPI/Swagger
            - Testing: PHPUnit

        details_print: |
          - Built and maintained REST APIs in PHP (Laravel/Lumen) for a web product and admin portal serving 100K+ users and ~4K DAU, owning delivery from development through production rollout and monitoring.
          - Upgraded a Laravel monolith from v7 to v10 in 2 months through incremental migration, compatibility validation, and unit-test coverage, restoring framework support and improving API p99 latency by 20%.
          - Resolved critical MySQL performance bottlenecks by profiling request paths, analyzing EXPLAIN plans, and refactoring indexes and table design, reducing hot-path query time from 10–20 seconds to ~1 second.
          - Owned a 3-tier AWS stack (ALB / EC2 / RDS) and service operations, including CI/CD, autoscaling, CloudWatch dashboards/alarms, load testing, and post-release monitoring.
          - Improved monitoring and incident response with Slack alerting, reducing MTTD by ~80%.
          - Built asynchronous backend workflows with SQS + Lambda, and delivered user-facing integrations including LINE Messaging API notifications and personalized recommendations that improved retention by ~20%.

