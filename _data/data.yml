          - Hardened Python container builds and runtimes with non-root execution and BuildKit-based secrets handling, reducing image size by ~58% and ~49% across services.
          - Investigated recurring OOM under sustained load by reproducing failures through load testing, isolating off-heap growth, Metaspace pressure, and a database bottleneck, and mitigating impact with query/index improvements and runtime tuning.
          - Delivered an event-driven video processing pipeline using S3, MediaConvert, and SQS/SNS, with status tracking and asynchronous polling for processing workflows.
          - Built reusable IaC-based CI/CD modules for all Spring Boot and Python backend projects, reducing pipeline time from 40 minutes to 20–25 minutes and standardizing delivery workflows across backend teams.
          - Developed a reusable, configuration-driven authentication SDK that enabled backend services to integrate in about 1 minute, eliminating repeated per-project implementation of HTTP clients and backpressure controls.
          - Defined and validated cross-account permission models and assessed cloud service capabilities for auth and infrastructure scenarios, balancing security, functional requirements, and cloud cost trade-offs.
          - Improved release safety and observability through CI quality gates, CloudWatch dashboards/alarms, centralized logging, and audit logging, supporting operational visibility and ISO 27001 compliance.
          - **Tech**: Python/Java, FastAPI/Spring Boot, PostgreSQL/Redis/DynamoDB, AWS EKS/SQS/Lambda/CloudWatch, Terraform/Helm, k6/Vegeta.

      - role: Backend Software Engineer
        time: Apr 2020 - Nov 2023
        company: |
          HiSKIO, [Online Learning Platform](https://hiskio.com)
        details: |
          - Built and maintained REST APIs in PHP (Laravel/Lumen) for a web product and admin portal serving 100K+ users with ~4K DAU, owning end-to-end delivery from development to production rollout and monitoring.
          - Upgraded an entire Laravel monolith from v7 to v10 over 2 months through incremental migration, compatibility validation, and unit-test protection, restoring framework support and improving API p99 latency by 20%.
          - Resolved critical MySQL performance bottlenecks by profiling request paths, analyzing EXPLAIN plans, and refactoring indexes and table design, reducing hot-path query time from 10–20 seconds to ~1 second.
          - Owned a 3-tier AWS stack (ALB / EC2 / RDS) and service operations, including CI/CD, autoscaling, CloudWatch dashboards/alarms, load testing, and post-release monitoring.
          - Improved monitoring and incident response with Slack alerting, reducing MTTD by ~80%.
          - Built asynchronous backend workflows with SQS + Lambda, and delivered user-facing integrations including LINE Messaging API notifications and personalized recommendations that improved retention by ~20%.
          - **Tech**:
            - Languages: PHP, JavaScript, Python
            - Frameworks: Laravel, Lumen, Vue, Nuxt
            - Datastores: MySQL, SQLite
            - Cloud/Infra: AWS (EC2, ALB, RDS, SQS, Lambda, CloudWatch, ECR, S3)
            - Tooling: Docker, Docker Swarm, OpenAPI/Swagger
            - Testing: PHPUnit

        details_print: |
