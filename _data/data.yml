  career-profile:
      title: 關於我
      summary: >
        資深後端 / 平台工程師，具備 6 年以上在 AWS 與 EKS 上設計並建置雲原生後端系統、shared platform capabilities 與 production infrastructure 的經驗。曾維運支撐超過 250 萬用戶、峰值約 1 萬 RPS 的高流量服務，專注於 system design、authentication、authorization、API design、performance、reliability、CI/CD 與 observability。

        擅長將模糊業務需求、production bottlenecks 與重複性整合工作轉化為可擴展的工程系統：設計 reusable authentication 與 service bootstrap patterns 並推廣至約 20 個後端服務、核心服務 latency 最多降低 77%、throughput 從 300 提升至 500 RPS、排除高流量 database bottlenecks，並將 CI/CD pipeline 從 40 分鐘縮短至 20～25 分鐘。

  experiences:
