      - role: Backend Software Engineer
        time: Apr 2020 - Nov 2023
        company: |
          HiSKIO, [Online Learning Platform](https://hiskio.com)
        details: |
          - Built and operated RESTful APIs in PHP (Laravel/Lumen) for a 100K+ user online learning platform with ~4K DAU, supporting revenue- and retention-critical workflows including cart, payment, learning progress tracking, membership, internal/admin back office, revenue sharing, and coupon systems.
          - Upgraded a Laravel monolith from v7 to v10 in 2 months through incremental migration, compatibility validation, and unit-test coverage, reducing framework risk and improving API p99 latency by 20%.
          - Resolved critical MySQL performance bottlenecks by profiling request paths, analyzing EXPLAIN plans, and refactoring indexes and table design, reducing hot-path query time from 10–20 seconds to ~1 second and improving key workflow responsiveness and conversion experience.
          - Owned the AWS production stack (ALB / EC2 / RDS) and release operations, including CI/CD, autoscaling, CloudWatch dashboards/alarms, load testing, and post-release monitoring, improving elasticity, service availability, and release safety while reducing interruption risk during product growth.
          - Improved monitoring and incident response with Slack alerting, reducing MTTD by ~80% and shortening issue detection time for user-facing and operational flows.
          - Built asynchronous backend workflows with SQS + Lambda to power LINE notifications and personalized recommendations, increasing repeat engagement and improving retention by ~20%.
          - **Tech**:
            - Languages: PHP, JavaScript, Python
            - Frameworks: Laravel, Lumen, Vue, Nuxt
            - Datastores: MySQL, SQLite
            - Cloud/Infra: AWS (EC2, ALB, RDS, SQS, Lambda, CloudWatch, ECR, S3)
            - Tooling: Docker, Docker Swarm, OpenAPI/Swagger
            - Testing: PHPUnit

