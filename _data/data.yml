            - 負責 3-tier AWS stack 與系統維運，涵蓋 CI/CD、自動擴縮與上線後監控，讓產品需求能在成長期間維持可預期的交付節奏。
            - 導入 Slack 告警機制與 incident response，將 MTTD 降低約 80%，縮短故障發現與處理時間，減少對使用者與營運的影響。
            - 以 SQS + Lambda 建立非同步後端流程，串接 LINE Messaging API 通知與個人化推薦，提升回訪與互動效果，並帶動約 20% 的留存成長。

