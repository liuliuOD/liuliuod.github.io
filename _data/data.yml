career-profile:
    title: About Me
    summary: >
      Senior Backend / Platform Engineer with 6+ years of experience building and operating cloud-native distributed systems on AWS and EKS. I have led and delivered business-critical backend and platform initiatives for products serving 2.5M+ users and ~10K peak RPS, with a focus on reliability, performance, operational efficiency, and reusable engineering capabilities. My work spans identity and access flows, API design, event-driven systems, observability, and platform standardization, and I work effectively across engineering, product, and business stakeholders to turn technical improvements into measurable user and organizational impact.

experiences:
    title: Experiences
    info:
      - role: Senior Backend Software Engineer
        time: Dec 2023 - Present
        company: |
          President Chain Store Corporation(PCSC), [Web Portal](https://www.uniopen.com), [APP](https://www.uniopen.com/app)
        details: |
          - Built and operated backend services for a high-traffic web portal and mobile app serving 2.5M+ users and ~10K peak RPS on AWS + EKS, supporting login-protected user journeys and campaign or push-notification traffic spikes of ~200K users.
          - Built the company’s core post-login authorization service from 0 to 1, owning API access validation and OIDC identity lifecycle management for business-critical flows; complete request tracing improved customer-support investigation and response speed by 30% and strengthened malicious-behavior detection.
          - Designed OIDC/SSO identity and session flows as a shared foundation for membership, access control, and cross-service routing, and delivered a reusable authentication SDK plus API service template that enabled backend services to integrate in about 1 minute and helped a ~20-person team reduce project bootstrap time by 80%.
          - Led performance baselining, load testing, and tuning for a core authorization service supporting login-protected APIs, reducing critical endpoint latency by up to 77% and increasing throughput from 300 to 500 RPS to improve peak-period user experience.
          - Traced and resolved a complex multi-service production incident during traffic spikes, reducing DB CPU from >85% to 20–30%, eliminating timeouts, and lowering operational risk for login-dependent flows.
          - Hardened Python container builds and runtimes with non-root execution and BuildKit-based secrets handling, reducing image size by ~58% and ~49% across services.
          - Reproduced recurring OOM issues under sustained load, isolated off-heap growth, Metaspace pressure, and database bottlenecks, and mitigated them through query/index improvements and runtime tuning to improve peak-load resilience and reduce production failure risk.
          - Built reusable IaC-based CI/CD modules for Spring Boot and Python backend projects, cutting pipeline time from 40 minutes to 20–25 minutes; the modularized pipeline was adopted by at least 10 services and reduced ongoing delivery setup and maintenance cost.
          - Improved release safety and observability through CI quality gates, CloudWatch dashboards/alarms, centralized logging, and audit logging, strengthening user-action traceability, detecting malicious operations, and reducing incident investigation time by 30%.
          - Designed and operated a multi-product redirect service for uniopen web, uniopen app, and Open Point APP entry pages, covering hundreds of pages, dozens of brands, and millions of product cards; the service delivered click events to Kafka within 200ms, blocked malicious links through domain validation, and improved user-journey continuity through SSO-aware redirects.
          - Applied EKS / Kubernetes / Istio expertise to capacity planning and production debugging, including requests/limits sizing and bottleneck analysis for Istio gateway, load balancers, and pod placement issues, improving peak-period stability.
          - **Tech**:
            - Languages: Python, Java
            - Frameworks: FastAPI, Spring Boot
            - Datastores: PostgreSQL, Redis, DynamoDB, DocumentDB
            - Cloud/Infra: AWS (EKS, S3, SQS, SNS, Lambda, CloudWatch, MediaConvert)
            - Tooling: Terraform, Helm, Docker, Kubernetes
            - Testing/Perf: k6, Vegeta

        details_print: |
          - Built and operated backend services for a high-traffic web portal and mobile app serving 2.5M+ users and ~10K peak RPS on AWS + EKS, supporting login-protected user journeys and campaign or push-notification traffic spikes of ~200K users.
