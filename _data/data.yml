      - role: Backend Software Engineer
        time: Apr 2020 - Nov 2023
        company: |
          HiSKIO, [Online Learning Platform](https://hiskio.com)
        details: |
          - Built and maintained RESTful APIs in PHP (Laravel/Lumen) for a web product and admin portal serving 100K+ users and ~4K DAU, supporting core learning and operations workflows from development through production rollout and monitoring.
          - Upgraded a Laravel monolith from v7 to v10 in 2 months through incremental migration, compatibility validation, and unit-test coverage, reducing framework risk and improving API p99 latency by 20%.
          - Resolved critical MySQL performance bottlenecks by profiling request paths, analyzing EXPLAIN plans, and refactoring indexes and table design, reducing hot-path query time from 10–20 seconds to ~1 second and improving key workflow responsiveness.
          - Owned a 3-tier AWS stack (ALB / EC2 / RDS) and service operations, including CI/CD, autoscaling, CloudWatch dashboards/alarms, load testing, and post-release monitoring, to keep product delivery predictable during growth.
          - Improved monitoring and incident response with Slack alerting, reducing MTTD by ~80%.
          - Built asynchronous backend workflows with SQS + Lambda, and delivered user-facing integrations including LINE Messaging API notifications and personalized recommendations that improved retention by ~20%.
