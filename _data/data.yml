zh:
  sidebar:
      name: 劉佳旻（劉劉）
      tagline: 資深後端 / 平台工程師
  education:
      title: 學歷
      info:
        - degree: 資訊工程學士
          university: 嘉義大學
          time: 2015 - 2019
  career-profile:
      title: 關於我
      summary: >
        我是一位專注於後端與平台的軟體工程師，具備 6 年以上在 AWS 與 EKS 上建置與營運雲原生分散式系統的經驗。曾主導服務超過 250 萬用戶、峰值約 1 萬 RPS 的高流量系統，持續聚焦效能、穩定性與營運效率。工作範圍涵蓋 API 設計、資料模型、事件驅動流程與可觀測性，也能與跨部門團隊協作，推動後端與平台能力落地。

  experiences:
      title: 經歷
      info:
      - role: 資深後端與平台工程師
        time: 2023/12 - 現在
        company: |
          統一超商股份有限公司（PCSC）, [入口網站](https://www.uniopen.com), [APP](https://www.uniopen.com/app)
        details: |
            - 從 0 到 1 建置公司登入授權核心服務，負責所有登入後 API 的存取驗證與 OIDC 身分生命週期管理，支援活動上線、訊息推播等約 20 萬用戶瞬時湧入的業務情境。系統部署於 AWS + EKS，支援超過 250 萬用戶、峰值約 1 萬 RPS，並透過完整請求歷程紀錄加快客服回覆速度與問題查找時間。
            - 設計 OIDC/SSO 與 session 流程，作為會員登入、權限控管與跨服務路由的共用核心；搭配可重用的 authentication SDK，讓後端服務整合時間縮短至約 1 分鐘，降低多系統整合成本。
            - 主導登入後核心權限服務的效能基準測試、壓測與調校，使關鍵 endpoint latency 最多降低 77%，並將吞吐量從 300 提升至 500 RPS，改善高峰期使用體驗。
            - 排查並解決登入依賴流量尖峰下的正式環境事故，將 DB CPU 從 85% 以上降至 20~30%，並消除 timeout，降低營運風險與客服壓力。
            - 透過持續壓測定位 OOM、off-heap 成長、Metaspace 壓力與 database bottleneck，並以查詢與索引優化、執行環境調校改善瓶頸，提升系統在尖峰流量與行銷檔期下的承載能力。
            - 主導共用型 IaC-based CI/CD 平台優化，將 Spring Boot 與 Python 後端專案的交付流程標準化，讓多個 backend 團隊共用同一套交付模組；並透過模組化、平行化與建置步驟重整，將 pipeline 時間從 40 分鐘縮短至 20~25 分鐘，讓導入團隊持續受益。
            - 開發可重用的身分驗證 SDK，讓後端服務可在約 1 分鐘內完成整合，降低新服務接入與重工成本，並加速共用身份能力的落地。
            - 建立 CI 品質門檻、CloudWatch 儀表板/警示、集中式 logging 與 audit logging，提升發版安全性、故障追蹤效率與稽核可追溯性。
            - 設計並維運多產品共用的 redirect service，覆蓋 uniopen web、uniopen app 與 Open Point APP 等入口頁面，支援數百個頁面、數十個品牌與數百萬個商品卡片的導流與落地頁承接需求。
            - 負責外站導流治理、白名單驗證、Kafka 非同步事件傳遞，以及與子服務 SSO 流程的整合，確保導流與登入流程在產品活動高峰期仍能穩定運作並避免錯誤流量進入。
            - 深入掌握 EKS / Kubernetes / Istio 架構，能依工作負載設計資源 requests / limits，並透過壓測與線上排查定位 Istio gateway、LB 與 pod placement 相關瓶頸，支援容量規劃與故障排除。
