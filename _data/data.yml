career-profile:
    title: About Me
    summary: |
      - Backend / Platform Engineer with 6+ years of experience spanning monolith/3-tier systems and Kubernetes-based microservices on AWS.
      - Operated services at scale (2.5M+ users, ~10K QPS peak) and led reliability/performance improvements (up to -77% latency, +18% QPS).
      - Strong in CI/CD delivery, observability, and evidence-based incident investigation (e.g., OOM deep dives).

experiences:
    title: Experiences
    info:
      - role: Backend Software Engineer
        time: Dec 2023 - Present
        company: |
          President Chain Store Corporation(PCSC), [Web Portal](https://www.uniopen.com)
        details: |
          - Built and operated backend services for a microservices web portal (2.5M+ users, peak ~10K QPS) on AWS + Kubernetes (EKS).
          - Designed end-to-end identity/access and session flows (OIDC/SSO) and implemented core domain services (membership, access, routing).
          - Partnered with PO to clarify requirements, propose solution options/trade-offs, and align implementation details with mobile app, platform engineering, and frontend teams; shortened requirement-to-implementation cycle time.
          - Diagnosed recurring OOM in a critical API under sustained load (reproduced via load testing) and drove partial mitigation:
            - Used container/runtime evidence to pinpoint three issues happening in parallel: off-heap native memory growth, rapid class loading that pressured Metaspace, and a database query bottleneck.
            - Reduced customer-facing impact by optimizing database access (added/adjusted key indexing).
          - Led performance baseline, load testing, and iterative optimization for a platform-critical authorization service:
            - Achieved measurable wins on critical endpoints (up to -77% latency and +18% QPS) and validated SLA targets (500+ QPS for key APIs).
            - Implemented async and caching improvements and identified service bottlenecks (managed datastore/cache limits, thread pool behavior).
          - Delivered an event-driven video processing pipeline on AWS (object storage + managed transcoding + messaging) with status tracking, async polling.
          - Designed multi-app SSO flows across app and web with an extensible, multi-business-unit-friendly approach.
          - Improved Python container security (non-root runtime, secret handling in builds, hardened runtime settings) and reduced image sizes by ~58%.
          - Strengthened release reliability and observability with CI/CD quality gates (unit/feature tests, style/static checks) plus CloudWatch dashboards/alarms and centralized log visualization.
          - Implemented audit logging to support ISO 27001 compliance and improve traceability.
          - **Skills (Keywords)**:
            - Languages: Python 3, Java
            - Frameworks: FastAPI, Spring Boot
            - Databases: DocumentDB, DynamoDB, PostgreSQL, Redis
            - AWS: EKS, ALB/ELB, SQS, Lambda, MediaConvert, SNS, CodePipeline, CodeBuild, CloudWatch, ECR, S3, CloudFront
            - Tools: Docker, Kubernetes, Terraform, Helm
            - Load Testing: K6, Vegeta

        details_print: |
          - Built and operated backend services for a microservices web portal (2.5M+ users, peak ~10K QPS) on AWS + Kubernetes (EKS).
          - Designed end-to-end identity/access flows (OIDC/SSO) and implemented core domain services (membership, access, routing).
          - Partnered with PO and cross-functional teams to clarify requirements, propose trade-offs, and shorten the requirement-to-implementation cycle time.
          - Diagnosed recurring OOM under sustained load and drove partial mitigation using container/runtime evidence (off-heap growth, Metaspace pressure, DB bottleneck).
          - Led a 2-week performance baseline and load-test optimization for a platform-critical authorization service; achieved up to -77% latency and +18% QPS; validated 500+ QPS SLA.
          - Delivered an event-driven video processing pipeline on AWS (object storage + managed transcoding + messaging).
          - Improved Python container security and reduced image sizes by ~58%.
          - Strengthened CI/CD quality gates, observability (CloudWatch + centralized logs), and audit logging for ISO 27001 compliance.

      - role: Backend Software Engineer
        time: Apr 2020 - Nov 2023
        company: |
          HiSKIO, [Online Learning Platform](https://hiskio.com)
        details: |
          - **Development**:
            - Developed and maintained RESTful APIs using PHP (Laravel, Lumen) for both customer-facing web and admin portal.
            - Improved API performance by 20-30% through profiling, refactoring, and database query optimization.
            - Optimized MySQL queries and reduced execution time by up to 50% for high-traffic endpoints.
            - Built automated unit tests (PHPUnit) to improve business-logic correctness and reduce regression risk.
            - Authored and maintained API documentation using OpenAPI/Swagger to improve cross-team collaboration.
            - Implemented asynchronous and event-driven workflows using AWS SQS and AWS Lambda (Python 3, Node.js workers).
            - Integrated OpenAI API to deliver a customized learning assistant chatbot.
            - Integrated LINE Messaging API with internal services to support user-triggered workflows and notifications.
            - Delivered personalized recommendations via LINE chatbot and improved customer retention by ~20%.
            - Proposed partial Serverless adoption, evaluated trade-offs, planned the migration approach, and led implementation.

          - **Operations and Maintenance**:
            - Operated and maintained a 3-tier architecture on AWS (ALB, EC2, RDS) with reliability and scalability improvements.
            - Designed and implemented CI/CD pipelines using AWS CodePipeline, CodeBuild, and CodeDeploy for automated deployments.
            - Implemented autoscaling with EC2 Auto Scaling Groups and CloudWatch Alarms to handle traffic spikes; managed Docker images in Amazon ECR.
            - Containerized services using Docker and streamlined deployments across staging and production; reduced Docker image size by ~50%.
            - Managed service deployments using Docker Swarm.
            - Planned and executed framework/runtime upgrades (Laravel 8/9/10); migrated from PHP-FPM to Laravel Octane (Swoole).

          - **Monitoring and Incident Response**:
            - Monitored logs and service health using AWS CloudWatch Logs and CloudWatch Dashboards.
            - Implemented Slack alerting for production incidents and reduced mean time to detect (MTTD) by ~80%.

          - **Search Engine Optimization (SEO)**:
            - Improved SPA SEO performance by integrating an on-premises prerendering solution (Prerender).

          - **Skills (Keywords)**:
            - Languages: PHP, Python 3, JavaScript
            - Frameworks: Laravel, Lumen, Vue, Nuxt
            - Database: MySQL, SQLite
            - AWS: EC2, ALB/ELB, RDS, SQS, Lambda, CodePipeline, CodeBuild, CodeDeploy, CloudWatch, CloudFormation, API Gateway, ECR, S3, DynamoDB, Route 53
            - Tools: Docker, Docker Swarm, OpenAPI/Swagger, PHPUnit
            - Third-Party APIs: LINE, Google, YouTube, Facebook, GTM, GA4

        details_print: |
          - Developed and maintained RESTful APIs using PHP (Laravel, Lumen) on AWS.
          - Improved API performance by 20-30% and optimized MySQL queries (up to 50% faster).
          - Built asynchronous workflows using AWS SQS and AWS Lambda (Python 3, Node.js workers).
          - Implemented CI/CD with AWS CodePipeline, CodeBuild, and CodeDeploy; operated ALB, EC2, RDS.
          - Containerized services with Docker; reduced image size by ~50%; managed deployments with Docker Swarm.
          - Implemented monitoring and alerting (CloudWatch Logs, Dashboards, Slack) and reduced MTTD by ~80%.
          - Integrated OpenAI API and LINE Messaging API to deliver chatbots and improved retention by ~20%.

      - role: Intern & Software Engineer
        time: Nov 2019 - Mar 2020, Sep 2018 - Jul 2019
        company: |
          Awoo, [SEO](https://www.awoo.org) & [AI Marketing Platform](https://www.awoo.ai/zh-hant)
        details: |
          - **Projects**:
            - Develop & Maintain iteration of RESTful API build by Laravel and CodeIgniter2.
              - build resiliency API for backstage website.
              - maintain SEO SaaS tool.
              - Integrate user behaviour tracking with HubSpot.
          - **Techniques**:
            - PHP • Laravel • Code Igniter 2
            - Third-Party API (HubSpot)
        details_print: |
          - Develop & Maintain iteration of RESTful API build by Laravel and CodeIgniter2.

