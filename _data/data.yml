        details: |
            - 建置並維運高流量 web portal 與 mobile app 的後端與平台服務，系統部署於 AWS + EKS，支援超過 250 萬用戶、峰值約 1 萬 RPS，並承接活動與推播帶來約 20 萬用戶瞬時湧入的登入後流量情境。
            - 從 0 到 1 建置公司級登入授權核心服務，負責 API 存取驗證、token handling 與 OIDC 身分生命週期管理，支撐核心會員與授權流程。
            - 設計 OIDC/SSO 與 session 流程，作為會員登入、授權與跨服務路由的共用基礎；並提供 reusable authentication SDK 與 API service template，支援約 20 個後端服務完成初始整合，將整合與服務建置時間降低約 80%。
            - 主導登入後核心授權服務的效能基準測試、壓測與調校，使關鍵 service endpoint latency 最多降低 77%，並將吞吐量從 300 提升至 500 RPS，改善高峰期使用體驗。
            - 排查並解決流量尖峰下的複雜正式環境事故，將 DB CPU 從 85% 以上降至 20～30%，並消除 timeout，降低登入依賴流程的營運風險。
            - 標準化 Spring Boot 與 Python 後端服務的 IaC-based CI/CD、CloudWatch 儀表板/警示、集中式 logging 與 audit logging，將 pipeline 時間從 40 分鐘縮短至 20～25 分鐘，並將 incident 調查時間降低約 30%。
