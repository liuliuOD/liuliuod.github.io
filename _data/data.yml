      summary: |
        - 我是一位專注於後端與平台的軟體工程師，具備 6 年以上在 AWS 與 EKS 上設計、建置與營運雲原生分散式系統的經驗。
        - 曾負責服務超過 250 萬用戶、峰值約 1 萬 QPS 的高流量系統，能從架構與基礎設施設計的角度持續提升效能、穩定性與營運效率。
        - 熟悉 API 設計、資料模型、事件驅動流程與可觀測性等系統級議題，也能與跨部門團隊協作，推動 identity、authorization 與 platform 相關方案落地。
        - 重視可驗證、可維護且可擴充的工程決策，習慣以降低複雜度、提升可維護性與量化成效為目標。

