            - 以 PHP (Laravel/Lumen) 建置並維運 RESTful APIs，支撐購物車、金流、學習歷程追蹤、會員功能、內部人員與老師使用的後台、分潤系統與優惠券系統等核心學習與營運流程，服務超過 10 萬用戶、約 4K DAU。
